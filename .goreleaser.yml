version: 2

project_name: coded

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    main: .
    binary: coded
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"

  - id: android
    main: .
    binary: coded
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - android
    goarch:
      - arm64

archives:
  - formats: [binary]
    format_overrides:
      - goos: windows
        formats: [binary]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  footer: |
    ---
    ## Install

    Prefer the one-line installer over downloading the binary directly — it detects your OS/arch and puts `coded` on your PATH.

    **Linux / macOS**
    ```sh
    curl -fsSL https://raw.githubusercontent.com/HashShin/coded/main/install.sh | sh
    ```

    **Windows (PowerShell)**
    ```powershell
    irm https://raw.githubusercontent.com/HashShin/coded/main/install.ps1 | iex
    ```

    **Termux (Android)** — via the [Termux User Repository](https://github.com/termux-user-repository/tur):
    ```sh
    pkg install tur-repo   # adds the TUR (only needed once)
    pkg install coded
    ```
