version: 2

project_name: coded

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: coded
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"

archives:
  - formats: [binary]
    format_overrides:
      - goos: windows
        formats: [binary]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  footer: |
    ---
    Termux users: `coded` is also available in the [TUR](https://github.com/termux-user-repository/tur) — `pkg install coded` after enabling the tur-repo.
